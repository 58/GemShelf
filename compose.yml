# 開発用 compose
# 使い方: docker compose up
services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/rails                        # ソースをマウント（ホットリロード用）
      - bundle:/usr/local/bundle        # bundle キャッシュ
      - rails_storage:/rails/storage    # SQLite / Active Storage 保存先
    stdin_open: true
    tty: true

  css:
    build: .
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    command: bin/rails tailwindcss:watch[poll]
    tty: true

volumes:
  bundle:
  rails_storage:
